# =====================================================================
# IOT-Modular-Microservice — Fase Awal
# Fokus: Kong (routing/JWT/rate-limit/CORS), NATS (pub-sub/req-reply),
#         Auth Service (RBAC/Refresh Token/Retention)
# =====================================================================

services:

  # ──────────────────────────────────────
  # AUTH SERVICE — database mandiri
  # ──────────────────────────────────────
  mariadb-auth:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE_AUTH}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./volumes/mariadb-auth:/var/lib/mysql
      - ./infra/mariadb/auth/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infra/mariadb/my.cnf:/etc/mysql/conf.d/disable-aio.cnf:ro
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - iot-net

  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_DSN: "${DB_USER}:${DB_PASSWORD}@tcp(mariadb-auth:3306)/${MYSQL_DATABASE_AUTH}?parseTime=true"
      NATS_URL: "nats://nats:4222"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_EXPIRY: "${JWT_EXPIRY:-15m}"
      REFRESH_EXPIRY: "${REFRESH_EXPIRY:-168h}"
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@smartfarm.local}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin1234}"
      PORT: "8080"
    depends_on:
      mariadb-auth:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  # ──────────────────────────────────────
  # WS-Gateway — single bridged WebSocket (NATS → dashboard)
  # ──────────────────────────────────────
  wsgateway:
    build:
      context: ./services/wsgateway
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NATS_URL: "nats://nats:4222"
      PORT: "8090"
      JWT_SECRET: "${JWT_SECRET}"
    depends_on:
      nats:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8090/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  # ──────────────────────────────────────
  # NATS — JetStream Event Bus
  # ──────────────────────────────────────
  nats:
    image: nats:2.10-alpine # sama persis dengan scratch, + shell tools (wget untuk healthcheck)
    restart: unless-stopped
    command: [ "-c", "/etc/nats/nats.conf" ]
    volumes:
      - ./infra/nats/nats.conf:/etc/nats/nats.conf:ro
      - ./volumes/nats:/data
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8222/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  # ──────────────────────────────────────
  # MOSQUITTO — MQTT Broker (ESP32 gateway)
  # ──────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./infra/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./infra/mosquitto/config/acl.conf:/mosquitto/config/acl.conf:ro
      - ./volumes/mosquitto:/mosquitto/data
    ports:
      - "1883:1883"
    networks:
      - iot-net

  # ──────────────────────────────
  # MariaDB Control — control database
  # ──────────────────────────────
  mariadb-control:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE_CONTROL}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./volumes/mariadb-control:/var/lib/mysql
      - ./infra/mariadb/control/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infra/mariadb/my.cnf:/etc/mysql/conf.d/disable-aio.cnf:ro
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - iot-net

  # ──────────────────────────────
  # Redis Module — cache for module service
  # ──────────────────────────────
  redis-module:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./volumes/redis-module:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  # ──────────────────────────────
  # TimescaleDB Module — time-series telemetry
  # ──────────────────────────────
  timescaledb-module:
    image: timescale/timescaledb:2.17.2-pg16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${TIMESCALE_DATABASE_MODULE}
    volumes:
      - ./volumes/timescaledb-module:/var/lib/postgresql/data
      - ./infra/timescaledb/module/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - iot-net

  # ──────────────────────────────
  # MariaDB Module — module database
  # ──────────────────────────────
  mariadb-module:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE_MODULE}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./volumes/mariadb-module:/var/lib/mysql
      - ./infra/mariadb/module/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infra/mariadb/my.cnf:/etc/mysql/conf.d/disable-aio.cnf:ro
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - iot-net

  # ──────────────────────────────
  # TimescaleDB Analytics — time-series rollup store (Analytics Service)
  # ──────────────────────────────
  timescaledb-analytics:
    image: timescale/timescaledb:2.17.2-pg16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${TIMESCALE_ANALYTICS_DB}
    volumes:
      - ./volumes/timescaledb-analytics:/var/lib/postgresql/data
      - ./infra/timescaledb/analytics/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - iot-net

  # ──────────────────────────────
  # MODULE SERVICE — device registry, telemetry tag-mapping, ingest
  # ──────────────────────────────────────
  module:
    build:
      context: ./services/module
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8080"
      DB_DSN: "${DB_USER}:${DB_PASSWORD}@tcp(mariadb-module:3306)/${MYSQL_DATABASE_MODULE}?parseTime=true&charset=utf8mb4"
      TIMESCALE_DSN: "postgres://${DB_USER}:${DB_PASSWORD}@timescaledb-module:5432/${TIMESCALE_DATABASE_MODULE}?sslmode=disable"
      REDIS_ADDR: "redis-module:6379"
      NATS_URL: "nats://nats:4222"
      MQTT_URL: "${MQTT_URL}"
      MQTT_USER: "${MQTT_USER}"
      MQTT_PASS: "${MQTT_PASS}"
      MQTT_TOPIC_PREFIX: "${MQTT_TOPIC_PREFIX}"
      JWT_SECRET: "${JWT_SECRET}"
    depends_on:
      mariadb-module:
        condition: service_healthy
      redis-module:
        condition: service_started
      timescaledb-module:
        condition: service_healthy
      nats:
        condition: service_started
      mosquitto:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  # ──────────────────────────────
  # ANALYTICS SERVICE — aggregated telemetry queries (TimescaleDB rollups)
  # ──────────────────────────────
  analytics:
    build:
      context: ./services/analytics
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8080"
      TIMESCALE_DSN: "postgres://${DB_USER}:${DB_PASSWORD}@timescaledb-analytics:5432/${TIMESCALE_ANALYTICS_DB}?sslmode=disable"
      NATS_URL: "nats://nats:4222"
    depends_on:
      timescaledb-analytics:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  control:
    build:
      context: ./services/control
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8080"
      DB_DSN: "${DB_USER}:${DB_PASSWORD}@tcp(mariadb-control:3306)/${MYSQL_DATABASE_CONTROL}?parseTime=true&charset=utf8mb4"
      NATS_URL: "nats://nats:4222"
      MQTT_URL: "${MQTT_URL}"
      MQTT_USER: "${MQTT_USER}"
      MQTT_PASS: "${MQTT_PASS}"
      MQTT_TOPIC_PREFIX: "${MQTT_TOPIC_PREFIX}"
      JWT_SECRET: "${JWT_SECRET}"
      MODULE_URL: "http://module:8080"
      ACK_TIMEOUT_SECONDS: "${ACK_TIMEOUT_SECONDS:-8}"
      TIMEZONE: "${TIMEZONE:-Asia/Jakarta}"
    depends_on:
      mariadb-control:
        condition: service_healthy
      nats:
        condition: service_started
      mosquitto:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  # ──────────────────────────────────────
  # KONG — API Gateway (satu-satunya pintu masuk)
  # ──────────────────────────────────────
  kong:
    image: kong:3.6
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"  # expose to internal network for Prometheus scraping
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_LOG_LEVEL: info
    volumes:
      - ./infra/kong/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "8000:8000" # HTTP proxy (eksternal)
      - "8443:8443" # HTTPS proxy (eksternal)
    depends_on:
      - auth
    healthcheck:
      test: [ "CMD", "kong", "health" ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  # ────────────────────────────────────
  # PROMETHEUS — Metrics Aggregator
  # ────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.4.1
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"           # allows hot-reload via POST /-/reload
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./volumes/prometheus:/prometheus
    ports:
      - "9090:9090"   # Prometheus UI & API (eksternal, debugging)
    depends_on:
      - auth
      - kong
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:9090/-/healthy" ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  # ────────────────────────────────────
  # GRAFANA — Visualisasi & Service Health Dashboard
  # Auto-provision datasource Prometheus + dashboard via volume mount.
  # ────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./volumes/grafana:/var/lib/grafana
    ports:
      # Bound to localhost only — do not expose the Grafana admin UI publicly.
      - "127.0.0.1:3000:3000"   # Grafana UI
    depends_on:
      - prometheus
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  # ────────────────────────────────────
  # MONITOR — Docker Compose Resource Monitor
  # CLI tool to check CPU, RAM, Network, and Disk usage
  # ────────────────────────────────────
  monitor:
    build:
      context: ./services/monitor
      dockerfile: Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/workspace/docker-compose.yml:ro
    working_dir: /workspace
    command: ["stats"]
    networks:
      - iot-net

  # ────────────────────────────────────
  # EXPORTERS — metrik infra ke Prometheus
  # Setiap exporter mengekspos /metrics agar Prometheus bisa scrape
  # service database/broker yang tidak punya endpoint Prometheus native.
  # ────────────────────────────────────

  # MariaDB Auth
  mysqld-exporter-auth:
    image: prom/mysqld-exporter:v0.15.1
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "${DB_USER}:${DB_PASSWORD}@(mariadb-auth:3306)/"
    volumes:
      - ./infra/mysqld-exporter/my.auth.cnf:/.my.cnf:ro
    depends_on:
      mariadb-auth:
        condition: service_healthy
    networks:
      - iot-net

  # MariaDB Control
  mysqld-exporter-control:
    image: prom/mysqld-exporter:v0.15.1
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "${DB_USER}:${DB_PASSWORD}@(mariadb-control:3306)/"
    volumes:
      - ./infra/mysqld-exporter/my.control.cnf:/.my.cnf:ro
    depends_on:
      mariadb-control:
        condition: service_healthy
    networks:
      - iot-net

  # MariaDB Module
  mysqld-exporter-module:
    image: prom/mysqld-exporter:v0.15.1
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "${DB_USER}:${DB_PASSWORD}@(mariadb-module:3306)/"
    volumes:
      - ./infra/mysqld-exporter/my.module.cnf:/.my.cnf:ro
    depends_on:
      mariadb-module:
        condition: service_healthy
    networks:
      - iot-net

  # MariaDB Stream
  mysqld-exporter-stream:
    image: prom/mysqld-exporter:v0.15.1
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "${DB_USER}:${DB_PASSWORD}@(mariadb-stream:3306)/"
    volumes:
      - ./infra/mysqld-exporter/my.stream.cnf:/.my.cnf:ro
    depends_on:
      mariadb-stream:
        condition: service_healthy
    networks:
      - iot-net

  mysqld-exporter-ml:
    image: prom/mysqld-exporter:v0.15.1
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "${DB_USER}:${DB_PASSWORD}@(mariadb-ml:3306)/"
    volumes:
      - ./infra/mysqld-exporter/my.ml.cnf:/.my.cnf:ro
    depends_on:
      mariadb-ml:
        condition: service_healthy
    networks:
      - iot-net

  # Redis (Module cache)
  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis-module:6379"
    depends_on:
      redis-module:
        condition: service_started
    networks:
      - iot-net

  # TimescaleDB Module
  postgres-exporter-module:
    image: wrouesnel/postgres_exporter:latest
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER}:${DB_PASSWORD}@timescaledb-module:5432/${TIMESCALE_DATABASE_MODULE}?sslmode=disable"
    depends_on:
      timescaledb-module:
        condition: service_healthy
    networks:
      - iot-net

  # TimescaleDB Analytics
  postgres-exporter-analytics:
    image: wrouesnel/postgres_exporter:latest
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER}:${DB_PASSWORD}@timescaledb-analytics:5432/${TIMESCALE_ANALYTICS_DB}?sslmode=disable"
    depends_on:
      timescaledb-analytics:
        condition: service_healthy
    networks:
      - iot-net

  # Mosquitto MQTT Broker — scrape $SYS/broker/# via MQTT
  mosquitto-exporter:
    image: sapcc/mosquitto-exporter:latest
    restart: unless-stopped
    command:
      - "--endpoint=tcp://mosquitto:1883"
      - "--bind-address=:9234"
    depends_on:
      - mosquitto
    networks:
      - iot-net

  # NATS JetStream — sidecar exporter (NATS monitoring port hanya JSON,
  # butuh exporter ini untuk menghasilkan format Prometheus di :7777)
  nats-exporter:
    image: natsio/prometheus-nats-exporter:latest
    restart: unless-stopped
    command:
      - "-varz"
      - "-connz"
      - "-subz"
      - "-routez"
      - "-jsz=all"
      - "http://nats:8222"
    depends_on:
      - nats
    networks:
      - iot-net

  # ──────────────────────────────────────
  # DASHBOARD — Vite frontend (dev mode, HMR)
  # Di-build dari ./dashboard (Dockerfile). Source di-mount sebagai volume
  # agar perubahan file langsung ter-reload. Berbicara ke Kong (published
  # port 8000) dari browser; tidak butuh join network secara khusus.
  # ──────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Dikonsumsi browser (host), bukan container → pakai host-published Kong.
      VITE_API_URL: "http://localhost:8000"
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard:/app
      - /app/node_modules   # jaga node_modules image (musl) agar tidak tertimpa host
    depends_on:
      - kong
    networks:
      - iot-net

  # ──────────────────────────────────────
  # MariaDB Stream — stream metadata database (Stream Service)
  # ──────────────────────────────────────
  mariadb-stream:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE_STREAM}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./volumes/mariadb-stream:/var/lib/mysql
      - ./infra/mariadb/stream/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infra/mariadb/my.cnf:/etc/mysql/conf.d/disable-aio.cnf:ro
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - iot-net

  # ──────────────────────────────────────
  # MariaDB for ML / Vision API (model registry + detection history)
  # ──────────────────────────────────────
  mariadb-ml:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE_ML}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./volumes/mariadb-ml:/var/lib/mysql
      - ./infra/mariadb/ml/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infra/mariadb/my.cnf:/etc/mysql/conf.d/disable-aio.cnf:ro
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - iot-net

  # ──────────────────────────────────────
  # MediaMTX — RTSP/WebRTC/HLS server (CCTV pull + playback)
  # API internal-only (iot-net); HLS proxied via Kong, WebRTC host-direct.
  # ──────────────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    command: [ "/etc/mediamtx/mediamtx.yml" ]
    volumes:
      - ./infra/mediamtx/mediamtx.yml:/etc/mediamtx/mediamtx.yml:ro
    ports:
      - "8888:8888"   # HLS (also proxied via Kong /hls)
      - "8889:8889"   # WebRTC (signaling + UDP media, host-direct)
      - "8554:8554"   # RTSP (debug)
      # API (9997) intentionally NOT published — internal iot-net only.
    networks:
      - iot-net

  # ──────────────────────────────────────
  # MinIO — object storage (shared infra; Stream Service does not use in Fase 5)
  # Buckets stream/ml/ota provisioned by minio-setup for Fase 6/10.
  # ──────────────────────────────────────
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - ./volumes/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 10s
      timeout: 10s
      retries: 15
    networks:
      - iot-net

  minio-setup:
    image: minio/mc
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "mc alias set m http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY} &&
             mc mb -p m/stream; mc mb -p m/mlbucket; mc mb -p m/ota; mc mb -p m/ml-result &&
             mc anonymous set download m/ml-result"
    networks:
      - iot-net

  # ──────────────────────────────────────
  # CCTV CAPTURE CRON — external data-collection job (NOT a microservice)
  # Every 8h it checks the pump/load telemetry; when the pump is OFF or the
  # output load is 0 (no misting), it grabs a CCTV frame via ffmpeg, runs
  # inference through the ML service API, and stores the frame + result in the
  # `ml-result` MinIO bucket.
  # ──────────────────────────────────────
  cctv-capture:
    build:
      context: ./services/cctv-capture
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      CAPTURE_INTERVAL_HOURS: "${CCTV_CAPTURE_INTERVAL_HOURS}"
      CAPTURE_STREAMS: "${CCTV_CAPTURE_STREAMS}"
      PUMP_PATHS: "${CCTV_PUMP_PATHS}"
      LOAD_PATHS: "${CCTV_LOAD_PATHS}"
      NODE_IDS: "${CCTV_NODE_IDS}"
      CONDITION_MODE: "${CCTV_CONDITION_MODE}"
      SKIP_WHEN_TELEMETRY_MISSING: "${CCTV_SKIP_WHEN_TELEMETRY_MISSING}"
      ML_BASE_URL: "${CCTV_ML_BASE_URL}"
      ML_API_TOKEN: "${CCTV_ML_API_TOKEN}"
      AUTH_BASE_URL: "${CCTV_AUTH_BASE_URL}"
      AUTH_USERNAME: "${CCTV_AUTH_USERNAME}"
      AUTH_PASSWORD: "${CCTV_AUTH_PASSWORD}"
      MODEL_ID: "${CCTV_MODEL_ID}"
      MINIO_RESULT_BUCKET: "${CCTV_MINIO_RESULT_BUCKET}"
      MIRROR_ANNOTATED: "${CCTV_MIRROR_ANNOTATED}"
      REDIS_ADDR: "redis-module:6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      MEDIAMTX_RTSP_URL: "rtsp://mediamtx:8554"
      MEDIAMTX_API_URL: "http://mediamtx:9997"
      STREAM_BASE_URL: "http://stream:8080"
      CCTV_RTSP_URL: "${CCTV_RTSP_URL}"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_URL: "${KONG_PUBLIC_URL:-http://localhost:8000}/minio"
      LOG_LEVEL: "INFO"
    depends_on:
      minio:
        condition: service_healthy
      ml:
        condition: service_started
      redis-module:
        condition: service_started
      mediamtx:
        condition: service_started
    networks:
      - iot-net

  # ──────────────────────────────────────
  # STREAM SERVICE — CCTV stream metadata + MediaMTX path registry
  # ──────────────────────────────────────
  stream:
    build:
      context: ./services/stream
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8080"
      DB_DSN: "${DB_USER}:${DB_PASSWORD}@tcp(mariadb-stream:3306)/${MYSQL_DATABASE_STREAM}?parseTime=true&charset=utf8mb4"
      MEDIAMTX_API_URL: "http://mediamtx:9997"
      MEDIAMTX_HTTP_URL: "http://mediamtx:8888"
      MEDIAMTX_RTSP_URL: "rtsp://mediamtx:8554"
      CCTV_RTSP_URL: "${CCTV_RTSP_URL}"
      KONG_PUBLIC_URL: "${KONG_PUBLIC_URL:-http://localhost:8000}"
      JWT_SECRET: "${JWT_SECRET}"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
      MINIO_USE_SSL: "false"
      MINIO_STREAM_BUCKET: "${MINIO_STREAM_BUCKET}"
      ML_BASE_URL: "http://ml:8080"
      ML_VISION_MODEL_ID: ""
    depends_on:
      mariadb-stream:
        condition: service_healthy
      mediamtx:
        condition: service_started
      ml:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  # ──────────────────────────────────────
  # ML SERVICE — YOLO model registry + inference (Python / FastAPI)
  # Reads source frames from `stream` bucket (read-only) and writes annotated
  # results to the `ml` bucket on the shared MinIO instance.
  # ──────────────────────────────────────
  ml:
    build:
      context: ./services/ml
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_URL: "mysql+pymysql://${DB_USER}:${DB_PASSWORD}@mariadb-ml:3306/${MYSQL_DATABASE_ML}?charset=utf8mb4"
      JWT_SECRET: "${JWT_SECRET}"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY}"
      MINIO_USE_SSL: "false"
      MINIO_ML_BUCKET: "${MINIO_ML_BUCKET}"
      MINIO_STREAM_BUCKET: "${MINIO_STREAM_BUCKET}"
      MINIO_PUBLIC_URL: "${KONG_PUBLIC_URL:-http://localhost:8000}/minio"
      NATS_URL: "nats://nats:4222"
      NATS_SUBJECT_DETECTION: "detection.result"
    volumes:
      # Persisted, pre-seeded with best.pt (your trained YOLO weights).
      - ./volumes/ml-models:/app/models
    depends_on:
      mariadb-ml:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health').status==200 else 1)" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - iot-net

networks:
  iot-net:
    driver: bridge
