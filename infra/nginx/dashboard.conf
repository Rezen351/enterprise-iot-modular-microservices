server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Dashboard disajikan di bawah /app (route Kong: /app)
    location = /app {
        return 302 /app/;
    }

    location /app/ {
        try_files $uri $uri/ /app/index.html;
    }

    # Jangan cache index.html agar update UI langsung terlihat
    location = /app/index.html {
        add_header Cache-Control "no-cache";
    }
}
