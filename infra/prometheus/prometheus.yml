# =============================================================================
# Prometheus Configuration — IOT-Modular-Microservice
# Scrape interval: 15s (default)
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    project: "iot-modular-microservice"
    env: "development"

# ─── Alertmanager (optional, configure when needed) ──────────────────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# ─── Scrape configs ───────────────────────────────────────────────────────────
scrape_configs:

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Auth Service — scrape via internal Docker network (direct, no Kong)
  - job_name: "auth-service"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["auth:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "auth-service"

  # Module Service — onboarding (module/node) metrics
  - job_name: "module-service"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["module:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "module-service"

  # WS-Gateway — NATS → WebSocket bridge metrics
  - job_name: "wsgateway-service"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["wsgateway:8090"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "wsgateway-service"

  # Analytics Service — telemetry aggregation metrics
  - job_name: "analytics-service"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["analytics:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "analytics-service"

  # Control Service — device command dispatch metrics
  - job_name: "control-service"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["control:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "control-service"

  # Stream Service — CCTV stream metadata + MediaMTX registry metrics
  - job_name: "stream-service"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["stream:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "stream-service"

  # Audit Service — audit log ingestion + query metrics
  - job_name: "audit-service"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["audit:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "audit-service"

  # ALERT SERVICE — threshold evaluation + alert API metrics
  - job_name: "alert-service"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["alert:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "alert-service"

  # Notification Service — alert notifications via multiple channels
  - job_name: "notification-service"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["notification:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "notification-service"

  # Export Service — historical data exporter
  - job_name: "export-service"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["export:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "export-service"

  # ML SERVICE — YOLO model registry + inference metrics
  - job_name: "ml-service"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["ml:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "ml-service"

  # Kong API Gateway — exposes metrics on port 8001 (admin API)
  - job_name: "kong"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["kong:8001"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "kong-gateway"

  # ─── Infra exporters ───────────────────────────────────────────────────

  # MariaDB Auth — via mysqld-exporter-all (ADR-005)
  - job_name: "mariadb-auth"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["mysqld-exporter-all:9104"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "mariadb-auth"

  # MariaDB Control — via mysqld-exporter-all (ADR-005)
  - job_name: "mariadb-control"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["mysqld-exporter-all:9105"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "mariadb-control"

  # MariaDB Module — via mysqld-exporter-all (ADR-005)
  - job_name: "mariadb-module"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["mysqld-exporter-all:9106"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "mariadb-module"

  # MariaDB Stream — via mysqld-exporter-all (ADR-005)
  - job_name: "mariadb-stream"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["mysqld-exporter-all:9107"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "mariadb-stream"

  # MariaDB Audit — via mysqld-exporter-all (ADR-005)
  - job_name: "mariadb-audit"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["mysqld-exporter-all:9108"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "mariadb-audit"

  # MariaDB Alert — via mysqld-exporter-all (ADR-005)
  - job_name: "mariadb-alert"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["mysqld-exporter-all:9109"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "mariadb-alert"

  # MariaDB Notification — via mysqld-exporter-all (ADR-005)
  - job_name: "mariadb-notification"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["mysqld-exporter-all:9110"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "mariadb-notification"

  # MariaDB ML / Vision — via mysqld-exporter-all (ADR-005)
  - job_name: "mariadb-ml"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["mysqld-exporter-all:9111"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "mariadb-ml"

  # Redis (Shared instance, multi-DB) — via single redis-exporter (ADR-004)
  # 1 instance redis-shared menggantikan redis-module/alert/notification/export.
  # Instance label membedakan DB per service (module=DB0, alert=DB1,
  # notification=DB2, export=DB3) agar metrik tetap terpisah di Grafana.
  - job_name: "redis-shared"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          db: "module"
      - targets: ["redis-exporter:9121"]
        labels:
          db: "alert"
      - targets: ["redis-exporter:9121"]
        labels:
          db: "notification"
      - targets: ["redis-exporter:9121"]
        labels:
          db: "export"
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "redis-shared"

  # TimescaleDB Module — via postgres-exporter-all (ADR-005)
  - job_name: "timescaledb-module"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["postgres-exporter-all:9187"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "timescaledb-module"

  # TimescaleDB Analytics — via postgres-exporter-all (ADR-005)
  - job_name: "timescaledb-analytics"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["postgres-exporter-all:9188"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "timescaledb-analytics"

  # Mosquitto MQTT Broker — via mosquitto-exporter ($SYS/broker/#)
  - job_name: "mosquitto"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["mosquitto-exporter:9234"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "mosquitto-broker"

  # NATS JetStream — via prometheus-nats-exporter sidecar (:7777)
  - job_name: "nats"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["nats-exporter:7777"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "nats-server"

  # ─── Host / container resource metrics ─────────────────────────────
  # Node Exporter — host CPU, memory, disk, network.
  - job_name: "node-exporter"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["node-exporter:9100"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "host-node"

  # cAdvisor — per-container CPU/RAM/IO/network (find container bottlenecks).
  - job_name: "cadvisor"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["cadvisor:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "host-containers"

