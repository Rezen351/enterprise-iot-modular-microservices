name: CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # CI: Test & Build for all services
  # ─────────────────────────────────────────────────────────────────────────────

  go-services:
    name: Go ${{ matrix.service }} (gofmt/vet/build)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth
          - module
          - analytics
          - control
          - alert
          - audit
          - notification
          - stream
          - export
          - wsgateway
          - dlq
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: services/${{ matrix.service }}/go.sum

      - name: gofmt check
        run: |
          cd services/${{ matrix.service }}
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: cd services/${{ matrix.service }} && go vet ./...

      - name: go build
        run: cd services/${{ matrix.service }} && go build ./...

  ml-service:
    name: ML Service (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ml
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx
      - name: pytest
        run: pytest -q || true

  docker-build:
    name: Docker build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [go-services, ml-service]
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth
          - module
          - analytics
          - control
          - alert
          - audit
          - notification
          - stream
          - export
          - wsgateway
          - dlq
          - ml
          - mysqld-exporter-all
          - postgres-exporter-all
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/${{ matrix.service }}
          if [[ "${{ matrix.service }}" == "mysqld-exporter-all" || "${{ matrix.service }}" == "postgres-exporter-all" ]]; then
            CONTEXT=infra/${{ matrix.service }}
            DOCKERFILE=infra/${{ matrix.service }}/Dockerfile
          else
            CONTEXT=services/${{ matrix.service }}
            DOCKERFILE=services/${{ matrix.service }}/Dockerfile
          fi
          docker buildx build -f "$DOCKERFILE" "$CONTEXT" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --tag $IMAGE:latest \
            --tag $IMAGE:${{ github.sha }} \
            --push

  dashboard-docker-build:
    name: Dashboard Docker build & push
    runs-on: ubuntu-latest
    needs: dashboard
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Dashboard image
        run: |
          IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/dashboard
          docker buildx build -f dashboard/Dockerfile dashboard \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --tag $IMAGE:latest \
            --tag $IMAGE:${{ github.sha }} \
            --push

  dashboard:
    name: Dashboard (lint/build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: npm ci
        run: npm ci
      - name: lint
        run: npm run lint
      - name: build
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────────────
  # CD: Deploy to Self-Hosted Server (only on push to main)
  # ─────────────────────────────────────────────────────────────────────────────

  cd-deploy:
    name: Deploy to Server
    needs: [go-services, ml-service, docker-build, dashboard-docker-build]
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted

    steps:
      - name: Pre-checkout Fix Permissions
        run: |
          echo "Fixing workspace ownership before checkout..."
          sudo chown -R $(whoami):$(whoami) $GITHUB_WORKSPACE 2>/dev/null || true
          sudo rm -rf $GITHUB_WORKSPACE/dashboard/node_modules 2>/dev/null || true
          echo "Workspace permissions fixed."

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 1
          sparse-checkout-cone-mode: false
          sparse-checkout: |
            docker-compose.yml
            .env.example
            infra

      - name: Configure Runner Network Retries
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $(echo '${{ github.actor }}' | tr '[:upper:]' '[:lower:]') --password-stdin

      - name: Set up Docker Compose Environment
        run: |
          echo "Preparing .env from GitHub Secrets with fallback defaults..."
          cp .env.example .env

          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD || 'app1234' }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER || 'app' }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD || 'app1234' }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET || 'changeme-use-a-very-long-random-string-here' }}" >> .env
          echo "CLOUDFLARED_TUNNEL_TOKEN=${{ secrets.CLOUDFLARED_TUNNEL_TOKEN || '' }}" >> .env
          echo "MINIO_ACCESS_KEY=${{ secrets.MINIO_ACCESS_KEY || 'minioadmin' }}" >> .env
          echo "MINIO_SECRET_KEY=${{ secrets.MINIO_SECRET_KEY || 'minioadmin' }}" >> .env
          echo "MINIO_STREAM_ACCESS_KEY=${{ secrets.MINIO_STREAM_ACCESS_KEY || 'ZGDJP7Verr817O3dwf8y' }}" >> .env
          echo "MINIO_STREAM_SECRET_KEY=${{ secrets.MINIO_STREAM_SECRET_KEY || '29B1XkbNURJVDKLourhEQlked9Qdl9Rmoo5r5B62' }}" >> .env
          echo "MINIO_ML_ACCESS_KEY=${{ secrets.MINIO_ML_ACCESS_KEY || 'fXaqHEsNJOFfQQCkE5Sc' }}" >> .env
          echo "MINIO_ML_SECRET_KEY=${{ secrets.MINIO_ML_SECRET_KEY || 'zpHJI7J0ojPoao1Kc2ZSpKzcpHI3zdn5e7bXBBRv' }}" >> .env
          echo "MINIO_OTA_ACCESS_KEY=${{ secrets.MINIO_OTA_ACCESS_KEY || 'obakBr4hHdWJtL2iWwgA' }}" >> .env
          echo "MINIO_OTA_SECRET_KEY=${{ secrets.MINIO_OTA_SECRET_KEY || 'dwvml0vQYMdLw3dFWKPGnMQ6cNXNmJTgbiC1mVji' }}" >> .env
          echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD || 'admin1234' }}" >> .env
          echo "KONG_JWT_SECRET_FRONTEND=${{ secrets.KONG_JWT_SECRET_FRONTEND || 'changeme-frontend-secret' }}" >> .env
          echo "MODULE_NATS_PASSWORD=${{ secrets.MODULE_NATS_PASSWORD || 'moduleNatsPass!' }}" >> .env
          echo "ALERT_NATS_PASSWORD=${{ secrets.ALERT_NATS_PASSWORD || 'alertNatsPass!' }}" >> .env
          echo "CONTROL_NATS_PASSWORD=${{ secrets.CONTROL_NATS_PASSWORD || 'controlNatsPass!' }}" >> .env
          echo "AUTH_NATS_PASSWORD=${{ secrets.AUTH_NATS_PASSWORD || 'authNatsPass!' }}" >> .env
          echo "ANALYTICS_NATS_PASSWORD=${{ secrets.ANALYTICS_NATS_PASSWORD || 'analyticsNatsPass!' }}" >> .env
          echo "NOTIFICATION_NATS_PASSWORD=${{ secrets.NOTIFICATION_NATS_PASSWORD || 'notifNatsPass!' }}" >> .env
          echo "AUDIT_NATS_PASSWORD=${{ secrets.AUDIT_NATS_PASSWORD || 'auditNatsPass!' }}" >> .env
          echo "WS_NATS_PASSWORD=${{ secrets.WS_NATS_PASSWORD || 'wsNatsPass!' }}" >> .env
          echo "GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD || 'change-me-strong-password' }}" >> .env
          echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD || '' }}" >> .env
          echo "MQTT_USER=${{ secrets.MQTT_USER || 'module-svc' }}" >> .env
          echo "MQTT_PASS=${{ secrets.MQTT_PASS || 'moduleSvcPass123' }}" >> .env
          echo "CONTROL_MQTT_USER=${{ secrets.CONTROL_MQTT_USER || 'control-svc' }}" >> .env
          echo "CONTROL_MQTT_PASS=${{ secrets.CONTROL_MQTT_PASS || 'controlSvcPass123' }}" >> .env

      - name: Fix Volume Permissions
        run: |
          echo "Fixing Docker volume permissions..."
          # Grafana runs as UID 472 inside container
          sudo chown -R 472:472 ./volumes/grafana 2>/dev/null || true
          # MinIO runs as UID 1000 inside container
          sudo chown -R 1000:1000 ./volumes/minio 2>/dev/null || true
          # MariaDB/MySQL directories
          sudo chown -R 999:999 ./volumes/mariadb-* 2>/dev/null || true
          # TimescaleDB/PostgreSQL directories
          sudo chown -R 70:70 ./volumes/timescaledb-* 2>/dev/null || true
          # Prometheus now runs as root in container; ensure volume is writable
          sudo chmod -R 777 ./volumes/prometheus 2>/dev/null || true
          # Clean stale Prometheus mmap/query log files from prior crash
          sudo rm -f ./volumes/prometheus/queries.active 2>/dev/null || true
          # Redis, cAdvisor, node-exporter
          sudo chown -R $(whoami):$(whoami) ./volumes/redis-shared ./volumes/cadvisor ./volumes/node-exporter 2>/dev/null || true
          echo "Volume permissions fixed."

      - name: Force Clean Workspace
        run: |
          echo "Stopping existing containers..."
          docker compose down --remove-orphans || true
          echo "Removing old images..."
          docker image prune -f || true

      - name: Pull and Deploy with Docker Compose
        run: |
          if docker compose pull; then
            echo "Pull succeeded, deploying without rebuild"
            docker compose up -d --no-build --remove-orphans
          else
            echo "Pull failed, falling back to local build for missing images"
            docker compose up -d --build --remove-orphans
          fi

      - name: Clean Up Old Docker Images
        if: always()
        run: |
          docker image prune -f
