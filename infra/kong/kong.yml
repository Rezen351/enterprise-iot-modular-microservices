_format_version: "3.0"
_transform: true

# =====================================================================
# Kong Declarative Configuration
# Plugins aktif: jwt, rate-limiting, cors
# Services yang dikelola: auth (fase awal)
# =====================================================================

# ─── JWT Credential Secrets ──────────────────────────────────────────
# Didaftarkan pada consumer level; setiap microservice client
# mendapat key/secret sendiri.
consumers:
  - username: frontend-client
    jwt_secrets:
      - key: frontend-key
        algorithm: HS256
        secret: "${KONG_JWT_SECRET_FRONTEND}"

  - username: esp32-device
    jwt_secrets:
      - key: esp32-key
        algorithm: HS256
        secret: "${KONG_JWT_SECRET_ESP32}"

# ─── Global plugins (berlaku untuk semua route) ──────────────────────
plugins:
  # Prometheus — expose metrik Kong di Admin API port 8001 (/metrics)
  # Di-scrape oleh Prometheus server (job "kong" → kong:8001).
  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true

  # Rate Limiting global — fallback jika route tidak punya override
  - name: rate-limiting
    config:
      minute: 300
      hour: 6000
      policy: local
      fault_tolerant: true
      hide_client_headers: false

  # CORS global
  - name: cors
    config:
      origins:
        - "http://localhost:3000"
        - "http://localhost:5173"
        - "http://100.90.187.130:5173"
        - "${FRONTEND_URL}"
        - ".*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - X-Request-ID
      exposed_headers:
        - X-Request-ID
        - X-RateLimit-Remaining-Minute
      credentials: true
      max_age: 3600
      preflight_continue: false

  # Security response headers — injected on every proxied response (defense
  # in depth). HSTS is harmless over plain HTTP (browsers ignore it) and takes
  # effect once traffic is served via the HTTPS Cloudflare Tunnel.
  - name: response-transformer
    config:
      add:
        headers:
          - "Content-Security-Policy: default-src 'self'"
          - "X-Content-Type-Options: nosniff"
          - "X-Frame-Options: DENY"
          - "Referrer-Policy: no-referrer"
          - "Permissions-Policy: geolocation=(), camera=(), microphone=()"
          - "Strict-Transport-Security: max-age=31536000; includeSubDomains"
      remove:
        headers:
          - "Server"
          - "X-Powered-By"

# ─── Upstreams ────────────────────────────────────────────────────────
upstreams:
  - name: auth-upstream
    algorithm: round-robin
    healthchecks:
      active:
        http_path: /health
        healthy:
          interval: 10
          successes: 1
        unhealthy:
          interval: 5
          http_failures: 2
    targets:
      - target: auth:8080
        weight: 100

  - name: module-upstream
    algorithm: round-robin
    healthchecks:
      active:
        http_path: /health
        healthy:
          interval: 10
          successes: 1
        unhealthy:
          interval: 5
          http_failures: 2
    targets:
      - target: module:8080
        weight: 100

  - name: wsgateway-upstream
    algorithm: round-robin
    healthchecks:
      active:
        http_path: /health
        healthy:
          interval: 10
          successes: 1
        unhealthy:
          interval: 5
          http_failures: 2
    targets:
      - target: wsgateway:8090
        weight: 100

  - name: analytics-upstream
    algorithm: round-robin
    healthchecks:
      active:
        http_path: /health
        healthy:
          interval: 10
          successes: 1
        unhealthy:
          interval: 5
          http_failures: 2
    targets:
      - target: analytics:8080
        weight: 100

  - name: control-upstream
    algorithm: round-robin
    healthchecks:
      active:
        http_path: /health
        healthy:
          interval: 10
          successes: 1
        unhealthy:
          interval: 5
          http_failures: 2
    targets:
      - target: control:8080
        weight: 100

  - name: audit-upstream
    algorithm: round-robin
    healthchecks:
      active:
        http_path: /health
        healthy:
          interval: 10
          successes: 1
        unhealthy:
          interval: 5
          http_failures: 2
    targets:
      - target: audit:8080
        weight: 100

  - name: alert-upstream
    algorithm: round-robin
    healthchecks:
      active:
        http_path: /health
        healthy:
          interval: 10
          successes: 1
        unhealthy:
          interval: 5
          http_failures: 2
    targets:
      - target: alert:8080
        weight: 100

  - name: stream-upstream
    algorithm: round-robin
    healthchecks:
      active:
        http_path: /health
        healthy:
          interval: 10
          successes: 1
        unhealthy:
          interval: 5
          http_failures: 2
    targets:
      - target: stream:8080
        weight: 100

  - name: ml-upstream
    algorithm: round-robin
    healthchecks:
      active:
        http_path: /health
        healthy:
          interval: 10
          successes: 1
        unhealthy:
          interval: 5
          http_failures: 2
    targets:
      - target: ml:8080
        weight: 100

  - name: notification-upstream
    algorithm: round-robin
    healthchecks:
      active:
        http_path: /health
        healthy:
          interval: 10
          successes: 1
        unhealthy:
          interval: 5
          http_failures: 2
    targets:
      - target: notification:8080
        weight: 100

  - name: export-upstream
    algorithm: round-robin
    healthchecks:
      active:
        http_path: /health
        healthy:
          interval: 10
          successes: 1
        unhealthy:
          interval: 5
          http_failures: 2
    targets:
      - target: export-service:8080
        weight: 100

  # MediaMTX HLS upstream — Kong strips /hls and forwards to mediamtx:8888.
  # No active healthcheck: MediaMTX returns 404 on "/" which would otherwise
  # mark the target unhealthy. Passive checks (default) still apply.
  - name: mediamtx-hls-upstream
    algorithm: round-robin
    targets:
      - target: mediamtx:8888
        weight: 100

# ─── Services ─────────────────────────────────────────────────────────
services:
  # Auth Service
  - name: auth-service
    host: auth-upstream
    port: 8080
    protocol: http
    connect_timeout: 5000
    write_timeout: 10000
    read_timeout: 10000

    routes:
      # ── Public routes (no JWT required) ──────────────────────────
      - name: auth-public
        paths:
          - /auth/login
          - /auth/register
          - /auth/refresh
        methods:
          - GET
          - POST
          - OPTIONS
        strip_path: false
        plugins:
          # Rate-limit lebih ketat untuk endpoint auth publik (anti-brute-force)
          - name: rate-limiting
            config:
              minute: 60
              hour: 2000
              policy: local
              fault_tolerant: true
              error_message: "Too many login attempts. Please try again later."

      # ── Health check (public, NOT rate-limited) ──────────────────
      # Probes must stay reachable under load, so /health gets only the
      # generous global limit instead of the strict auth-public one.
      - name: auth-health
        paths:
          - /health
        methods:
          - GET
          - OPTIONS
        strip_path: false

      # ── Protected routes (JWT required) ──────────────────────────
      - name: auth-protected
        paths:
          - /auth/me
          - /auth/logout
          - /auth/password
          - /auth/sessions
          - /auth/account
          - /auth/users
          - /auth/roles
          - /auth/permissions
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        strip_path: false
        plugins:
          # JWT Verification — Kong memverifikasi token sebelum diteruskan ke service
          # Catatan: Auth Service menggunakan JWT_SECRET sendiri (bukan Kong consumer secret).
          # Kong di sini bertindak sebagai rate-limiter & entry point;
          # validasi claims dilakukan oleh Auth Service middleware (JWTAuth).
          - name: request-termination
            config:
              status_code: 401
              message: "missing or invalid Authorization header"
            enabled: false   # disabled — JWT validation handled by the service itself

          # Rate-limit untuk route terlindungi
          - name: rate-limiting
            config:
              minute: 300
              hour: 8000
              policy: local
              fault_tolerant: true

  # Module Service — onboarding perangkat (module & node)
  - name: module-service
    host: module-upstream
    port: 8080
    protocol: http
    connect_timeout: 5000
    write_timeout: 30000
    read_timeout: 30000

    routes:
      - name: module-routes
        paths:
          - /modules
          - /nodes
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 300
              hour: 8000
              policy: local
              fault_tolerant: true

  # WS-Gateway — single bridged WebSocket service (NATS → dashboard)
  - name: wsgateway-service
    host: wsgateway-upstream
    port: 8090
    protocol: http
    connect_timeout: 5000
    write_timeout: 60000
    read_timeout: 60000
    routes:
      - name: wsgateway-routes
        paths:
          - /ws
        methods:
          - GET
          - OPTIONS
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 300
              hour: 8000
              policy: local
              fault_tolerant: true

  # Analytics Service — aggregated telemetry queries for the dashboard
  - name: analytics-service
    host: analytics-upstream
    port: 8080
    protocol: http
    connect_timeout: 5000
    write_timeout: 10000
    read_timeout: 10000
    routes:
      - name: analytics-routes
        paths:
          - /analytics
        methods:
          - GET
          - OPTIONS
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 300
              hour: 8000
              policy: local
              fault_tolerant: true
              error_message: "Analytics request limit reached. Please try again later."

  # Control Service — device command dispatch (manual + scheduled)
  # JWT/RBAC (operator/admin) divalidated by Control Service middleware.
  - name: control-service
    host: control-upstream
    port: 8080
    protocol: http
    connect_timeout: 5000
    write_timeout: 10000
    read_timeout: 10000
    routes:
      - name: control-routes
        paths:
          - /control
          - /control/commands
          - /control/targets
          - /control/outputs
          - /control/schedules
          - /control/modes
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 300
              hour: 8000
              policy: local
              fault_tolerant: true

  # Audit Service — append-only audit log API (sensitive, admin-only read).
  # JWT validated + admin role enforced by Audit Service middleware.
  - name: audit-service
    host: audit-upstream
    port: 8080
    protocol: http
    connect_timeout: 5000
    write_timeout: 10000
    read_timeout: 10000
    routes:
      - name: audit-routes
        paths:
          - /audit
        methods:
          - GET
          - OPTIONS
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 300
              hour: 8000
              policy: local
              fault_tolerant: true

  # Alert Service — threshold evaluation API + alert history/notifications.
  # JWT validated by Alert Service middleware (any authenticated user for reads;
  # operator/admin for threshold mutations and alert acknowledgement).
  - name: alert-service
    host: alert-upstream
    port: 8080
    protocol: http
    connect_timeout: 5000
    write_timeout: 10000
    read_timeout: 10000
    routes:
      - name: alert-routes
        paths:
          - /alerts
          - /thresholds
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 300
              hour: 8000
              policy: local
              fault_tolerant: true

  # Stream Service — CCTV stream metadata + MediaMTX path registry.
  # JWT/RBAC (operator/admin for writes) validated by Stream Service middleware.
  - name: stream-service
    host: stream-upstream
    port: 8080
    protocol: http
    connect_timeout: 5000
    write_timeout: 120000
    read_timeout: 120000
    routes:
      - name: stream-routes
        paths:
          - /streams
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 300
              hour: 8000
              policy: local
              fault_tolerant: true
      - name: stream-snapshots-routes
        paths:
          - /snapshots
        methods:
          - GET
          - DELETE
          - OPTIONS
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 300
              hour: 8000
              policy: local
              fault_tolerant: true
      - name: stream-storage-routes
        paths:
          - /storage
        methods:
          - GET
          - OPTIONS
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 300
              hour: 8000
              policy: local
              fault_tolerant: true

  # ML SERVICE — YOLO model registry + inference. JWT/RBAC (operator/admin
  # for writes, all roles for reads) validated by ML Service middleware.
  - name: ml-service
    host: ml-upstream
    port: 8080
    protocol: http
    connect_timeout: 15000
    write_timeout: 60000
    read_timeout: 60000
    routes:
      - name: ml-routes
        paths:
          - /ml
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 300
              hour: 8000
              policy: local
              fault_tolerant: true

  # Notification Service
  - name: notification-service
    host: notification-upstream
    port: 8080
    protocol: http
    connect_timeout: 5000
    write_timeout: 10000
    read_timeout: 10000
    routes:
      - name: notification-routes
        paths:
          - /notifications
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 300
              hour: 8000
              policy: local
              fault_tolerant: true

  # Export Service
  - name: export-service
    host: export-upstream
    port: 8080
    protocol: http
    connect_timeout: 5000
    write_timeout: 30000
    read_timeout: 30000
    routes:
      - name: export-routes
        paths:
          - /export
        methods:
          - GET
          - OPTIONS
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 300
              hour: 8000
              policy: local
              fault_tolerant: true

  # MediaMTX HLS — proxied through Kong so dashboards play HLS via the gateway.
  # /hls/{name}/index.m3u8 -> mediamtx:8888/{name}/index.m3u8
  - name: mediamtx-hls-service
    host: mediamtx-hls-upstream
    port: 8888
    protocol: http
    connect_timeout: 5000
    write_timeout: 10000
    read_timeout: 10000
    routes:
      - name: stream-hls
        paths:
          - /hls
        methods:
          - GET
          - OPTIONS
        strip_path: true
        plugins:
          - name: rate-limiting
            config:
              minute: 300
              hour: 8000
              policy: local
              fault_tolerant: true

