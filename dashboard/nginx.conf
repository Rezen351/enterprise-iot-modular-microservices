server {
    listen 5173;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Dashboard-Relative-API "true" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Dynamic DNS resolution via Docker embedded DNS (127.0.0.11) so restarting Kong never causes 502
    resolver 127.0.0.11 valid=5s ipv6=off;
    set $kong_upstream http://kong:8000;
    set $mediamtx_upstream http://mediamtx:8888;

    # Proxy API requests to Kong
    location ~ ^/(v1|auth|health|modules|nodes|analytics|control|audit|alerts|thresholds|streams|snapshots|storage|ml|notifications|export|hls)/ {
        proxy_pass $kong_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass $kong_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy MediaMTX HLS/WebRTC if needed directly (requires mediamtx container)
    # Uncomment if mediamtx is running
    location ^~ /live/ {
        proxy_pass http://mediamtx:8888/;
        proxy_set_header Host $host;
        # MediaMTX v1.18+ HLS cookie redirect fix
        proxy_redirect / /live/;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback - serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
