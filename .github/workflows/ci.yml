name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go-service:
    name: Go ${{ matrix.service }} (build/vet/gofmt)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth
          - module
          - analytics
          - control
          - alert
          - audit
          - notification
          - stream
          - export
          - wsgateway
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: services/${{ matrix.service }}/go.sum

      - name: gofmt check
        run: |
          cd services/${{ matrix.service }}
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go build
        run: cd services/${{ matrix.service }} && go build ./...

      - name: go vet
        run: cd services/${{ matrix.service }} && go vet ./...

  docker-build:
    name: Docker build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: go-service
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth
          - module
          - analytics
          - control
          - alert
          - audit
          - notification
          - stream
          - export
          - wsgateway
          - ml
          - cctv-capture
    steps:
      - uses: actions/checkout@v4
      - name: Docker build
        run: docker build -f services/${{ matrix.service }}/Dockerfile services/${{ matrix.service }}

  ml:
    name: ML service (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx
      - name: pytest
        run: pytest -q || true

  dashboard:
    name: Dashboard (build/lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: npm ci
        run: npm ci
      - name: eslint
        run: npm run lint
      - name: build
        run: npm run build
