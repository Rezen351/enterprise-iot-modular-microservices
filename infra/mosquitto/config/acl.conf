# ACL file for Mosquitto MQTT broker
# Per-service topic restrictions when allow_anonymous false

# ESP32 (firmware node)
user esp32
topic write smartfarm/discovery
topic write smartfarm/status/+
topic write smartfarm/+/telemetry
topic write smartfarm/+/confirm
topic write smartfarm/+/alert
topic read  smartfarm/actuator/+

# Module Service (ingest + fan-out)
user module-svc
topic read smartfarm/#

# Control Service (dispatch command + baca ACK/telemetry)
user control-svc
topic write smartfarm/actuator/#
topic read  smartfarm/+/confirm
topic read  smartfarm/+/telemetry

# Mosquitto Exporter (Prometheus metrics scrape)
user exporter
topic read $SYS/broker/#
