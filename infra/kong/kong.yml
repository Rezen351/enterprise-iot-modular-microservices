_format_version: "3.0"
_transform: true

# =====================================================================
# Kong Declarative Configuration
# Plugins aktif: jwt, rate-limiting, cors
# Services yang dikelola: auth (fase awal)
# =====================================================================

# ─── JWT Credential Secrets ──────────────────────────────────────────
# Didaftarkan pada consumer level; setiap microservice client
# mendapat key/secret sendiri.
consumers:
  - username: frontend-client
    jwt_secrets:
      - key: frontend-key
        algorithm: HS256
        secret: "${KONG_JWT_SECRET_FRONTEND}"

  - username: esp32-device
    jwt_secrets:
      - key: esp32-key
        algorithm: HS256
        secret: "${KONG_JWT_SECRET_ESP32}"

# ─── Global plugins (berlaku untuk semua route) ──────────────────────
plugins:
  # Prometheus — expose metrik Kong di Admin API port 8001 (/metrics)
  # Di-scrape oleh Prometheus server (job "kong" → kong:8001).
  - name: prometheus
    config:
      status_code_metrics: true
      latency_metrics: true
      bandwidth_metrics: true
      upstream_health_metrics: true

  # Rate Limiting global — fallback jika route tidak punya override
  - name: rate-limiting
    config:
      minute: 100
      hour: 1000
      policy: local
      fault_tolerant: true
      hide_client_headers: false

  # CORS global
  - name: cors
    config:
      origins:
        - "http://localhost:3000"
        - "http://localhost:5173"
        - "${FRONTEND_URL}"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - X-Request-ID
      exposed_headers:
        - X-Request-ID
        - X-RateLimit-Remaining-Minute
      credentials: true
      max_age: 3600
      preflight_continue: false

# ─── Upstreams ────────────────────────────────────────────────────────
upstreams:
  - name: auth-upstream
    algorithm: round-robin
    healthchecks:
      active:
        http_path: /health
        healthy:
          interval: 10
          successes: 1
        unhealthy:
          interval: 5
          http_failures: 2
    targets:
      - target: auth:8080
        weight: 100

  - name: module-upstream
    algorithm: round-robin
    healthchecks:
      active:
        http_path: /health
        healthy:
          interval: 10
          successes: 1
        unhealthy:
          interval: 5
          http_failures: 2
    targets:
      - target: module:8080
        weight: 100

  - name: wsgateway-upstream
    algorithm: round-robin
    healthchecks:
      active:
        http_path: /health
        healthy:
          interval: 10
          successes: 1
        unhealthy:
          interval: 5
          http_failures: 2
    targets:
      - target: wsgateway:8090
        weight: 100

  - name: analytics-upstream
    algorithm: round-robin
    healthchecks:
      active:
        http_path: /health
        healthy:
          interval: 10
          successes: 1
        unhealthy:
          interval: 5
          http_failures: 2
    targets:
      - target: analytics:8080
        weight: 100

# ─── Services ─────────────────────────────────────────────────────────
services:
  # Auth Service
  - name: auth-service
    host: auth-upstream
    port: 8080
    protocol: http
    connect_timeout: 5000
    write_timeout: 10000
    read_timeout: 10000

    routes:
      # ── Public routes (no JWT required) ──────────────────────────
      - name: auth-public
        paths:
          - /health
          - /auth/login
          - /auth/register
          - /auth/refresh
        methods:
          - GET
          - POST
          - OPTIONS
        strip_path: false
        plugins:
          # Rate-limit lebih ketat untuk endpoint auth publik (anti-brute-force)
          - name: rate-limiting
            config:
              minute: 20
              hour: 100
              policy: local
              fault_tolerant: true
              error_message: "Terlalu banyak percobaan login. Coba lagi nanti."

      # ── Protected routes (JWT required) ──────────────────────────
      - name: auth-protected
        paths:
          - /auth/me
          - /auth/logout
          - /auth/password
          - /auth/sessions
          - /auth/account
          - /auth/users
          - /auth/roles
          - /auth/permissions
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        strip_path: false
        plugins:
          # JWT Verification — Kong memverifikasi token sebelum diteruskan ke service
          # Catatan: Auth Service menggunakan JWT_SECRET sendiri (bukan Kong consumer secret).
          # Kong di sini bertindak sebagai rate-limiter & entry point;
          # validasi claims dilakukan oleh Auth Service middleware (JWTAuth).
          - name: request-termination
            config:
              status_code: 401
              message: "missing or invalid Authorization header"
            enabled: false   # disabled — JWT validation handled by the service itself

          # Rate-limit untuk route terlindungi
          - name: rate-limiting
            config:
              minute: 60
              hour: 500
              policy: local
              fault_tolerant: true

  # Module Service — onboarding perangkat (module & node)
  - name: module-service
    host: module-upstream
    port: 8080
    protocol: http
    connect_timeout: 5000
    write_timeout: 10000
    read_timeout: 10000

    routes:
      - name: module-routes
        paths:
          - /modules
          - /nodes
        methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 120
              hour: 2000
              policy: local
              fault_tolerant: true

  # WS-Gateway — single bridged WebSocket service (NATS → dashboard)
  - name: wsgateway-service
    host: wsgateway-upstream
    port: 8090
    protocol: http
    connect_timeout: 5000
    write_timeout: 60000
    read_timeout: 60000
    routes:
      - name: wsgateway-routes
        paths:
          - /ws
        methods:
          - GET
          - OPTIONS
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 600
              hour: 10000
              policy: local
              fault_tolerant: true

  # Analytics Service — aggregated telemetry queries for the dashboard
  - name: analytics-service
    host: analytics-upstream
    port: 8080
    protocol: http
    connect_timeout: 5000
    write_timeout: 10000
    read_timeout: 10000
    routes:
      - name: analytics-routes
        paths:
          - /analytics
        methods:
          - GET
          - OPTIONS
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 120
              hour: 2000
              policy: local
              fault_tolerant: true
