openapi: 3.0.3
info:
  title: Webhook Service API
  version: 1.0.0
  description: >
    Receives webhook payloads (HTTP or NATS) and dispatches to Telegram, Email,
    and generic HTTP endpoints. All endpoints except /health return a standard
    wrapper: { "success": true, "data": ... } on 2xx or
    { "success": false, "error": { "code": "...", "message": "..." } } on 4xx/5xx.

servers:
  - url: http://localhost:8080
    description: Local development (Kong strips /v1 prefix)

paths:
  /health:
    get:
      tags: [Health]
      summary: Service liveness
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      status: { type: string, example: ok }

  /webhook/settings:
    get:
      tags: [Settings]
      summary: Get current channel settings (public view, no secrets)
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    $ref: '#/components/schemas/SettingsDTO'
        "401":
          $ref: '#/components/responses/Unauthorized'

    put:
      tags: [Settings]
      summary: Update webhook channel settings (admin only)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsPatch'
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    $ref: '#/components/schemas/SettingsDTO'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "500":
          $ref: '#/components/responses/InternalError'

  /webhook/logs:
    get:
      tags: [Logs]
      summary: List delivery logs (admin only)
      security:
        - BearerAuth: []
      parameters:
        - name: channel
          in: query
          schema:
            type: string
            enum: [telegram, email, webhook]
        - name: status
          in: query
          schema:
            type: string
            enum: [queued, retrying, sent, failed]
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Paginated delivery logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      logs:
                        type: array
                        items:
                          $ref: '#/components/schemas/LogDTO'
                      total: { type: integer }
                      limit: { type: integer }
                      offset: { type: integer }
        "401":
          $ref: '#/components/responses/Unauthorized'

  /webhook/test:
    post:
      tags: [Test]
      summary: Enqueue a dummy notification for testing (admin only)
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                channel:
                  type: string
                  description: Leave empty to test all enabled channels
                  enum: [telegram, email, webhook, '']
      responses:
        "202":
          description: Test notification queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      enqueued: { type: integer }
                      message: { type: string }
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /webhook/receive/telegram:
    post:
      tags: [Inbound]
      summary: Accept Telegram Bot API webhook updates
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Arbitrary Telegram update payload
      responses:
        "202":
          description: Accepted into processing queue
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      status: { type: string, example: accepted }

  /webhook/receive/email:
    post:
      tags: [Inbound]
      summary: Accept inbound email webhook payloads
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Arbitrary email webhook payload (SendGrid/Mailgun inbound parse)
      responses:
        "202":
          description: Accepted into processing queue
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      status: { type: string, example: accepted }

  /webhook/receive/generic:
    post:
      tags: [Inbound]
      summary: Accept arbitrary webhook payloads
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Arbitrary JSON payload
      responses:
        "202":
          description: Accepted into processing queue
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      status: { type: string, example: accepted }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ChannelSettings:
      type: object
      properties:
        enabled: { type: boolean }
        target: { type: string }

    SettingsDTO:
      type: object
      properties:
        telegram:
          $ref: '#/components/schemas/ChannelSettings'
        email:
          $ref: '#/components/schemas/ChannelSettings'
        webhook:
          $ref: '#/components/schemas/ChannelSettings'

    ChannelInput:
      type: object
      properties:
        enabled: { type: boolean }
        target: { type: string }
        secret:
          type: string
          description: Plaintext secret; encrypted server-side before storage

    SettingsPatch:
      type: object
      properties:
        telegram:
          $ref: '#/components/schemas/ChannelInput'
        email:
          $ref: '#/components/schemas/ChannelInput'
        webhook:
          $ref: '#/components/schemas/ChannelInput'

    LogDTO:
      type: object
      properties:
        id: { type: string, format: uuid }
        channel: { type: string }
        target: { type: string }
        subject: { type: string }
        body: { type: string }
        status: { type: string }
        attempts: { type: integer }
        error: { type: string }
        alert_id: { type: string }
        user_id: { type: string }
        created_at: { type: string, format: date-time }

  responses:
    Unauthorized:
      description: Missing or invalid Bearer token
      content:
        application/json:
          schema:
            type: object
            properties:
              success: { type: boolean, example: false }
              error:
                type: object
                properties:
                  code: { type: string, example: UNAUTHORIZED }
                  message: { type: string, example: invalid token }

    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            type: object
            properties:
              success: { type: boolean, example: false }
              error:
                type: object
                properties:
                  code: { type: string, example: BAD_REQUEST }
                  message: { type: string }

    InternalError:
      description: Server error
      content:
        application/json:
          schema:
            type: object
            properties:
              success: { type: boolean, example: false }
              error:
                type: object
                properties:
                  code: { type: string, example: INTERNAL_ERROR }
                  message: { type: string }
