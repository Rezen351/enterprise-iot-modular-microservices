# =====================================================================
# Cloudflare Tunnel — OPTIONAL local ingress config (cloudflared)
# =====================================================================
# The docker-compose `cloudflared` service runs in token-only mode and pulls
# its ingress from the Cloudflare Zero Trust dashboard. This file is NOT
# mounted by default. Uncomment and edit below only if you want to manage
# ingress locally instead of in the dashboard.
# =====================================================================

ingress:
  # ── API + dashboard gateway (Kong) ─────────────────────────────────
  # - hostname: api.example.com
  #   service: http://kong:8000
  #   originRequest:
  #     noTLSVerify: true

  # ── Catch-all: reject anything that does not match a rule above ─────
  - service: http_status:404
