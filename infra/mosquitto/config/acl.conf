# ACL file placeholder — allow all for development
# Format: topic [read|write|readwrite] <topic>
# (empty = no restrictions when allow_anonymous true)
#
# Ketika autentikasi MQTT diaktifkan (allow_anonymous false + password_file),
# terapkan aturan per-service berikut agar sesuai kontrak Fase 4:
#
#   # ESP32 (firmware node)
#   user esp32
#   topic write smartfarm/discovery
#   topic write smartfarm/status/%c
#   topic write smartfarm/%c/telemetry
#   topic write smartfarm/%c/confirm
#   topic write smartfarm/%c/alert
#   topic read  smartfarm/actuator/%c
#
#   # Module Service (ingest + fan-out)
#   user module-svc
#   topic read smartfarm/#
#
#   # Control Service (dispatch command + baca ACK/telemetry)
#   user control-svc
#   topic write smartfarm/actuator/#
#   topic read  smartfarm/+/confirm
#   topic read  smartfarm/+/telemetry
