# =====================================================================
# IOT-Modular-Microservice — Fase Awal
# Fokus: Kong (routing/JWT/rate-limit/CORS), NATS (pub-sub/req-reply),
#         Auth Service (RBAC/Refresh Token/Retention)
# =====================================================================

services:

  # ──────────────────────────────────────
  # AUTH SERVICE — database mandiri
  # ──────────────────────────────────────
  mariadb-auth:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: auth_db
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./volumes/mariadb-auth:/var/lib/mysql
      - ./infra/mariadb/auth/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infra/mariadb/my.cnf:/etc/mysql/conf.d/disable-aio.cnf:ro
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - iot-net

  auth:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    image: ghcr.io/rezen351/enterprise-iot-modular-microservices/auth:latest
    restart: unless-stopped
    environment:
      DB_DSN: "${DB_USER}:${DB_PASSWORD}@tcp(mariadb-auth:3306)/auth_db?parseTime=true"
      NATS_URL: "nats://nats:4222"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_EXPIRY: "12h"
      REFRESH_EXPIRY: "168h"
      ADMIN_USERNAME: admin
      ADMIN_EMAIL: admin@smartfarm.local
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin1234}"
      PORT: "8080"
    depends_on:
      mariadb-auth:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  # ──────────────────────────────────────
  # WS-Gateway — single bridged WebSocket (NATS → dashboard)
  # ──────────────────────────────────────
  wsgateway:
    build:
      context: ./services/wsgateway
      dockerfile: Dockerfile
    image: ghcr.io/rezen351/enterprise-iot-modular-microservices/wsgateway:latest
    restart: unless-stopped
    environment:
      NATS_URL: "nats://nats:4222"
      PORT: "8090"
      JWT_SECRET: "${JWT_SECRET}"
    depends_on:
      nats:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8090/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  # ──────────────────────────────────────
  # Alert Service — threshold evaluation + alert history/notifications
  # ──────────────────────────────────────
  alert:
    build:
      context: ./services/alert
      dockerfile: Dockerfile
    image: ghcr.io/rezen351/enterprise-iot-modular-microservices/alert:latest
    restart: unless-stopped
    environment:
      PORT: "8080"
      DB_DSN: "${DB_USER}:${DB_PASSWORD}@tcp(mariadb-alert:3306)/alert_db?parseTime=true&charset=utf8mb4"
      NATS_URL: "nats://nats:4222"
      JWT_SECRET: "${JWT_SECRET}"
      REDIS_ADDR: "redis-shared:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_DB: "1"
    depends_on:
      mariadb-alert:
        condition: service_healthy
      redis-shared:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  # ──────────────────────────────────────
  # NATS — JetStream Event Bus
  # ──────────────────────────────────────
  nats:
    image: nats:2.10-alpine # sama persis dengan scratch, + shell tools (wget untuk healthcheck)
    restart: unless-stopped
    command: [ "-c", "/etc/nats/nats.conf" ]
    volumes:
      - ./infra/nats/nats.conf:/etc/nats/nats.conf:ro
      - ./volumes/nats:/data
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8222/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  # ──────────────────────────────────────
  # MOSQUITTO — MQTT Broker (ESP32 gateway)
  # ──────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./infra/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./infra/mosquitto/config/acl.conf:/mosquitto/config/acl.conf:ro
      - ./infra/mosquitto/config/password_file:/mosquitto/config/password_file:ro
      - ./volumes/mosquitto:/mosquitto/data
    ports:
      - "1883:1883"
    networks:
      - iot-net

  # ──────────────────────────────
  # MariaDB Control — control database
  # ──────────────────────────────
  mariadb-control:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: control_db
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./volumes/mariadb-control:/var/lib/mysql
      - ./infra/mariadb/control/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infra/mariadb/my.cnf:/etc/mysql/conf.d/disable-aio.cnf:ro
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - iot-net

  # ──────────────────────────────
  # MariaDB Audit — append-only audit log store
  # ──────────────────────────────
  mariadb-audit:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: audit_db
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./volumes/mariadb-audit:/var/lib/mysql
      - ./infra/mariadb/audit/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infra/mariadb/my.cnf:/etc/mysql/conf.d/disable-aio.cnf:ro
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - iot-net

  # ──────────────────────────────
  # MariaDB Alert — thresholds + alert history store
  # ──────────────────────────────
  mariadb-alert:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: alert_db
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./volumes/mariadb-alert:/var/lib/mysql
      - ./infra/mariadb/alert/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infra/mariadb/my.cnf:/etc/mysql/conf.d/disable-aio.cnf:ro
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - iot-net

  # ──────────────────────────────
  # MariaDB Notification — notification database
  # ──────────────────────────────
  mariadb-notification:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: notification_db
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./volumes/mariadb-notification:/var/lib/mysql
      - ./infra/mariadb/notification/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infra/mariadb/my.cnf:/etc/mysql/conf.d/disable-aio.cnf:ro
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - iot-net

  # ──────────────────────────────
  # MariaDB Webhook — webhook dispatch and retry state
  # ──────────────────────────────
  mariadb-webhook:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: webhook_db
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./volumes/mariadb-webhook:/var/lib/mysql
      - ./infra/mariadb/webhook/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infra/mariadb/my.cnf:/etc/mysql/conf.d/disable-aio.cnf:ro
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - iot-net

  # ──────────────────────────────
  # Redis Shared — single consolidated Redis for module/alert/notification/export
  # (ADR-004). Logical DB isolation: module=0, alert=1, notification=2, export=3.
  # ──────────────────────────────
  redis-shared:
    image: redis:7-alpine
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - ./volumes/redis-shared:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  # ──────────────────────────────
  # TimescaleDB Module — time-series telemetry
  # ──────────────────────────────
  timescaledb-module:
    image: timescale/timescaledb:2.17.2-pg16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: module_ts
    volumes:
      - ./volumes/timescaledb-module:/var/lib/postgresql/data
      - ./infra/timescaledb/module/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - iot-net

  # ──────────────────────────────
  # MariaDB Module — module database
  # ──────────────────────────────
  mariadb-module:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: module_db
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./volumes/mariadb-module:/var/lib/mysql
      - ./infra/mariadb/module/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infra/mariadb/my.cnf:/etc/mysql/conf.d/disable-aio.cnf:ro
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - iot-net

  # ──────────────────────────────
  # TimescaleDB Analytics — time-series rollup store (Analytics Service)
  # ──────────────────────────────
  timescaledb-analytics:
    image: timescale/timescaledb:2.17.2-pg16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: analytics_ts
    volumes:
      - ./volumes/timescaledb-analytics:/var/lib/postgresql/data
      - ./infra/timescaledb/analytics/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - iot-net

  # ──────────────────────────────
  # MODULE SERVICE — device registry, telemetry tag-mapping, ingest
  # ──────────────────────────────────────
  module:
    build:
      context: ./services/module
      dockerfile: Dockerfile
    image: ghcr.io/rezen351/enterprise-iot-modular-microservices/module:latest
    restart: unless-stopped
    environment:
      PORT: "8080"
      DB_DSN: "${DB_USER}:${DB_PASSWORD}@tcp(mariadb-module:3306)/module_db?parseTime=true&charset=utf8mb4"
      TIMESCALE_DSN: "postgres://${DB_USER}:${DB_PASSWORD}@timescaledb-module:5432/module_ts?sslmode=disable"
      REDIS_ADDR: "redis-shared:6379"
      NATS_URL: "nats://nats:4222"
      MQTT_URL: "tcp://mosquitto:1883"
      MQTT_USER: "${MQTT_USER}"
      MQTT_PASS: "${MQTT_PASS}"
      MQTT_TOPIC_PREFIX: "${MQTT_TOPIC_PREFIX}"
      JWT_SECRET: "${JWT_SECRET}"
    depends_on:
      mariadb-module:
        condition: service_healthy
      redis-shared:
        condition: service_started
      timescaledb-module:
        condition: service_healthy
      nats:
        condition: service_started
      mosquitto:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  # ──────────────────────────────
  # ANALYTICS SERVICE — aggregated telemetry queries (TimescaleDB rollups)
  # ──────────────────────────────
  analytics:
    build:
      context: ./services/analytics
      dockerfile: Dockerfile
    image: ghcr.io/rezen351/enterprise-iot-modular-microservices/analytics:latest
    restart: unless-stopped
    environment:
      PORT: "8080"
      TIMESCALE_DSN: "postgres://${DB_USER}:${DB_PASSWORD}@timescaledb-analytics:5432/analytics_ts?sslmode=disable"
      NATS_URL: "nats://nats:4222"
      JWT_SECRET: "${JWT_SECRET}"
    depends_on:
      timescaledb-analytics:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  control:
    build:
      context: ./services/control
      dockerfile: Dockerfile
    image: ghcr.io/rezen351/enterprise-iot-modular-microservices/control:latest
    restart: unless-stopped
    environment:
      PORT: "8080"
      DB_DSN: "${DB_USER}:${DB_PASSWORD}@tcp(mariadb-control:3306)/control_db?parseTime=true&charset=utf8mb4"
      NATS_URL: "nats://nats:4222"
      MQTT_URL: "tcp://mosquitto:1883"
      MQTT_USER: "${CONTROL_MQTT_USER}"
      MQTT_PASS: "${CONTROL_MQTT_PASS}"
      MQTT_TOPIC_PREFIX: "${MQTT_TOPIC_PREFIX}"
      JWT_SECRET: "${JWT_SECRET}"
      MODULE_URL: "http://module:8080"
      ACK_TIMEOUT_SECONDS: "8"
      TIMEZONE: "Asia/Jakarta"
    depends_on:
      mariadb-control:
        condition: service_healthy
      nats:
        condition: service_started
      mosquitto:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  audit:
    build:
      context: ./services/audit
      dockerfile: Dockerfile
    image: ghcr.io/rezen351/enterprise-iot-modular-microservices/audit:latest
    restart: unless-stopped
    environment:
      PORT: "8080"
      DB_DSN: "${DB_USER}:${DB_PASSWORD}@tcp(mariadb-audit:3306)/audit_db?parseTime=true&charset=utf8mb4"
      NATS_URL: "nats://nats:4222"
      JWT_SECRET: "${JWT_SECRET}"
    depends_on:
      mariadb-audit:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  # ──────────────────────────────────────
  # DLQ Saga Worker — captures JetStream MaxDeliver advisories into the DLQ
  # JetStream stream (30d retention, R:2) and the audit DB. See ADR-006.
  # ──────────────────────────────────────
  dlq:
    build:
      context: ./services/dlq
      dockerfile: Dockerfile
    image: ghcr.io/rezen351/enterprise-iot-modular-microservices/dlq:latest
    restart: unless-stopped
    environment:
      PORT: "8080"
      DB_DSN: "${DB_USER}:${DB_PASSWORD}@tcp(mariadb-audit:3306)/audit_db?parseTime=true&charset=utf8mb4"
      NATS_URL: "nats://nats:4222"
      JWT_SECRET: "${JWT_SECRET}"
      DLQ_MAX_AGE_HOURS: "720"
      DLQ_REPLICAS: "2"
    depends_on:
      mariadb-audit:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  # ──────────────────────────────────────
  # Webhook Service — webhook receiver and dispatcher metrics
  # ──────────────────────────────────────
  webhook:
    build:
      context: ./services/webhook
      dockerfile: Dockerfile
    image: ghcr.io/rezen351/enterprise-iot-modular-microservices/webhook:latest
    restart: unless-stopped
    environment:
      PORT: "8080"
      DB_DSN: "${DB_USER}:${DB_PASSWORD}@tcp(mariadb-webhook:3306)/webhook_db?parseTime=true&charset=utf8mb4"
      REDIS_ADDR: "redis-shared:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_DB: "4"
      NATS_URL: "nats://nats:4222"
      JWT_SECRET: "${JWT_SECRET}"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET}"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASS: "${SMTP_PASS}"
      SMTP_FROM: "${SMTP_FROM}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
    depends_on:
      mariadb-webhook:
        condition: service_healthy
      redis-shared:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  # ──────────────────────────────────────
  # KONG — API Gateway (satu-satunya pintu masuk)
  # ──────────────────────────────────────
  kong:
    image: kong:3.6
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_LISTEN: "0.0.0.0:8000, 0.0.0.0:8443 ssl"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001" # expose to internal network for Prometheus scraping
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_LOG_LEVEL: info
    volumes:
      - ./infra/kong/kong.yml:/etc/kong/kong.yml:ro
    ports:
      - "8000:8000" # HTTP proxy (eksternal)
      - "8443:8443" # HTTPS proxy (eksternal)
    depends_on:
      - auth
    healthcheck:
      test: [ "CMD", "kong", "health" ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  # ──────────────────────────────────────
  # CLOUDFLARED — Cloudflare Tunnel (secure ingress)
  # Establishes an outbound-only tunnel to Cloudflare that proxies the
  # public hostname(s) to Kong:8000. Authentication uses the tunnel token
  # from .env (CLOUDFLARED_TUNNEL_TOKEN); ingress rules live in
  # infra/cloudflared/config.yml. No host ports are exposed.
  # ──────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    # Token-only run (same as `cloudflared service install <token>` on Windows):
    # the tunnel authenticates with CLOUDFLARED_TUNNEL_TOKEN and pulls its
    # ingress (public hostname → http://kong:8000) from the Cloudflare
    # Zero Trust dashboard. No local config / open host ports required.
    command:
      - "tunnel"
      - "run"
      - "--token"
      - "${CLOUDFLARED_TUNNEL_TOKEN}"
    environment:
      CLOUDFLARED_TUNNEL_TOKEN: "${CLOUDFLARED_TUNNEL_TOKEN}"
    depends_on:
      - kong
    networks:
      - iot-net

  # ────────────────────────────────────
  # PROMETHEUS — Metrics Aggregator
  # ────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.4.1
    restart: unless-stopped
    user: "0"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle" # allows hot-reload via POST /-/reload
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./volumes/prometheus:/prometheus
    ports:
      - "9090:9090" # Prometheus UI & API (eksternal, debugging)
    depends_on:
      - auth
      - kong
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:9090/-/healthy" ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  # ────────────────────────────────────
  # GRAFANA — Visualisasi & Service Health Dashboard
  # Auto-provision datasource Prometheus + dashboard via volume mount.
  # ────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    user: "0"
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
      GF_SERVER_ROOT_URL: "${GRAFANA_PUBLIC_URL:-%(protocol)s://%(domain)s:%(http_port)s/}"
      GF_SERVER_DOMAIN: "${GRAFANA_DOMAIN:-localhost}"
      GF_SESSION_COOKIE_SECURE: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./volumes/grafana:/var/lib/grafana
    ports:
      # Bound to all interfaces so it can be reached via VPN/LAN by this machine's IP.
      # For tighter security, replace 0.0.0.0 with the VPN/LAN IP (e.g. 172.31.225.221:3000:3000).
      - "0.0.0.0:3000:3000" # Grafana UI
    depends_on:
      - prometheus
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  # ────────────────────────────────────
  # EXPORTERS — metrik infra ke Prometheus
  # Setiap exporter mengekspos /metrics agar Prometheus bisa scrape
  # service database/broker yang tidak punya endpoint Prometheus native.
  # ────────────────────────────────────

  # MariaDB consolidated exporter (ADR-005, OPTION 1) — one container running
  # one mysqld_exporter process per target DB on a dedicated port.
  # Port mapping: 9104 auth, 9105 control, 9106 module, 9107 stream,
  # 9108 audit, 9109 alert, 9110 notification, 9111 ml, 9112 webhook.
  mysqld-exporter-all:
    build:
      context: ./infra/mysqld-exporter-all
      dockerfile: Dockerfile
    image: ghcr.io/rezen351/enterprise-iot-modular-microservices/mysqld-exporter-all:latest
    restart: unless-stopped
    environment:
      MYSQL_DSN_1: "${DB_USER}:${DB_PASSWORD}@tcp(mariadb-auth:3306)/"
      MYSQL_DSN_2: "${DB_USER}:${DB_PASSWORD}@tcp(mariadb-control:3306)/"
      MYSQL_DSN_3: "${DB_USER}:${DB_PASSWORD}@tcp(mariadb-module:3306)/"
      MYSQL_DSN_4: "${DB_USER}:${DB_PASSWORD}@tcp(mariadb-stream:3306)/"
      MYSQL_DSN_5: "${DB_USER}:${DB_PASSWORD}@tcp(mariadb-audit:3306)/"
      MYSQL_DSN_6: "${DB_USER}:${DB_PASSWORD}@tcp(mariadb-alert:3306)/"
      MYSQL_DSN_7: "${DB_USER}:${DB_PASSWORD}@tcp(mariadb-notification:3306)/"
      MYSQL_DSN_8: "${DB_USER}:${DB_PASSWORD}@tcp(mariadb-ml:3306)/"
      MYSQL_DSN_9: "${DB_USER}:${DB_PASSWORD}@tcp(mariadb-webhook:3306)/"
    depends_on:
      mariadb-auth:
        condition: service_healthy
      mariadb-control:
        condition: service_healthy
      mariadb-module:
        condition: service_healthy
      mariadb-stream:
        condition: service_healthy
      mariadb-audit:
        condition: service_healthy
      mariadb-alert:
        condition: service_healthy
      mariadb-notification:
        condition: service_healthy
      mariadb-ml:
        condition: service_healthy
      mariadb-webhook:
        condition: service_healthy
    networks:
      - iot-net

  # Redis Shared — single exporter for the consolidated Redis instance (ADR-004).
  # Prometheus scrapes it 4× with db labels (module/alert/notification/export)
  # so per-service metrics stay separate in Grafana.
  redis-exporter:
    image: oliver006/redis_exporter:v1.55.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis-shared:6379"
    depends_on:
      redis-shared:
        condition: service_healthy
    networks:
      - iot-net

  # Postgres/TimescaleDB consolidated exporter (ADR-005, OPTION 1) — one
  # container running one postgres_exporter process per target DB on a
  # dedicated port. Port mapping: 9187 module, 9188 analytics.
  postgres-exporter-all:
    build:
      context: ./infra/postgres-exporter-all
      dockerfile: Dockerfile
    image: ghcr.io/rezen351/enterprise-iot-modular-microservices/postgres-exporter-all:latest
    restart: unless-stopped
    environment:
      POSTGRES_DSN_1: "postgresql://${DB_USER}:${DB_PASSWORD}@timescaledb-module:5432/module_ts?sslmode=disable"
      POSTGRES_DSN_2: "postgresql://${DB_USER}:${DB_PASSWORD}@timescaledb-analytics:5432/analytics_ts?sslmode=disable"
    depends_on:
      timescaledb-module:
        condition: service_healthy
      timescaledb-analytics:
        condition: service_healthy
    networks:
      - iot-net

  # Mosquitto MQTT Broker — scrape $SYS/broker/# via MQTT
  mosquitto-exporter:
    image: sapcc/mosquitto-exporter:latest
    restart: unless-stopped
    command:
      - "--endpoint=tcp://mosquitto:1883"
      - "--user=exporter"
      - "--pass=exporterPass123"
      - "--bind-address=:9234"
    depends_on:
      - mosquitto
    networks:
      - iot-net

  # NATS JetStream — sidecar exporter (NATS monitoring port hanya JSON,
  # butuh exporter ini untuk menghasilkan format Prometheus di :7777)
  nats-exporter:
    image: natsio/prometheus-nats-exporter:latest
    restart: unless-stopped
    command:
      - "-varz"
      - "-connz"
      - "-subz"
      - "-routez"
      - "-jsz=all"
      - "http://nats:8222"
    depends_on:
      - nats
    networks:
      - iot-net

  # ──────────────────────────────────────
  # NODE-EXPORTER — host CPU/RAM/disk/network metrics
  # ──────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.2
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "9100:9100"
    networks:
      - iot-net

  # ──────────────────────────────────────
  # CADVISOR — per-container resource metrics (CPU/RAM/IO/network)
  # ──────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.50.0
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8891:8080"
    networks:
      - iot-net

  # ──────────────────────────────────────
  # DASHBOARD — Vite frontend (dev mode, HMR)
  # Di-build dari ./dashboard (Dockerfile). Source di-mount sebagai volume
  # agar perubahan file langsung ter-reload. Berbicara ke Kong (published
  # port 8000) dari browser; tidak butuh join network secara khusus.
  # ──────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: ghcr.io/rezen351/enterprise-iot-modular-microservices/dashboard:latest
    restart: unless-stopped
    environment:
      VITE_API_URL: "${VITE_API_URL}"
    ports:
      - "5173:5173"
    depends_on:
      - kong
    networks:
      - iot-net

  # ──────────────────────────────────────
  # MariaDB Stream — stream metadata database (Stream Service)
  # ──────────────────────────────────────
  mariadb-stream:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: stream_db
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./volumes/mariadb-stream:/var/lib/mysql
      - ./infra/mariadb/stream/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infra/mariadb/my.cnf:/etc/mysql/conf.d/disable-aio.cnf:ro
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - iot-net

  # ──────────────────────────────────────
  # MariaDB for ML / Vision API (model registry + detection history)
  # ──────────────────────────────────────
  mariadb-ml:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ml_db
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./volumes/mariadb-ml:/var/lib/mysql
      - ./infra/mariadb/ml/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./infra/mariadb/my.cnf:/etc/mysql/conf.d/disable-aio.cnf:ro
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - iot-net

  # ──────────────────────────────────────
  # MediaMTX — RTSP/WebRTC/HLS server (CCTV pull + playback)
  # API internal-only (iot-net); HLS proxied via Kong, WebRTC host-direct.
  # ──────────────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    command: [ "/etc/mediamtx/mediamtx.yml" ]
    volumes:
      - ./infra/mediamtx/mediamtx.yml:/etc/mediamtx/mediamtx.yml:ro
    ports:
      # HLS (8888) is NOT published to the host — it must be reached only
      # through the Kong auth proxy (/hls), which enforces JWT. Publishing it
      # to the host would expose streams without authentication.
      - "8889:8889" # WebRTC (signaling + UDP media, host-direct)
      - "8554:8554" # RTSP (debug)
      # API (9997) intentionally NOT published — internal iot-net only.
    networks:
      - iot-net

  # ──────────────────────────────────────
  # MinIO — object storage (shared infra; Stream Service does not use in Fase 5)
  # Buckets stream/ml provisioned by minio-setup for Fase 6.
  # ──────────────────────────────────────
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - ./volumes/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 10s
      timeout: 10s
      retries: 15
    networks:
      - iot-net

  minio-setup:
    image: minio/mc
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "mc alias set m http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY} &&
             mc mb -p m/stream; mc mb -p m/ml; mc mb -p m/ml-result &&
             mc anonymous set private m/stream; mc anonymous set private m/ml;
             mc anonymous set private m/ml-result"
    networks:
      - iot-net

  # ──────────────────────────────────────
  # STREAM SERVICE — CCTV stream metadata + MediaMTX path registry
  # ──────────────────────────────────────
  stream:
    build:
      context: ./services/stream
      dockerfile: Dockerfile
    image: ghcr.io/rezen351/enterprise-iot-modular-microservices/stream:latest
    restart: unless-stopped
    environment:
      PORT: "8080"
      DB_DSN: "${DB_USER}:${DB_PASSWORD}@tcp(mariadb-stream:3306)/stream_db?parseTime=true&charset=utf8mb4"
      MEDIAMTX_API_URL: "http://mediamtx:9997"
      MEDIAMTX_HTTP_URL: "http://mediamtx:8888"
      MEDIAMTX_RTSP_URL: "rtsp://mediamtx:8554"
      KONG_PUBLIC_URL: http://localhost:8000
      JWT_SECRET: "${JWT_SECRET}"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_STREAM_ACCESS_KEY}"
      MINIO_SECRET_KEY: "${MINIO_STREAM_SECRET_KEY}"
      MINIO_USE_SSL: "false"
      MINIO_STREAM_BUCKET: stream
      MINIO_RESULT_BUCKET: ml-result
      ML_BASE_URL: "http://ml:8080"
      ML_VISION_MODEL_ID: ""
    depends_on:
      mariadb-stream:
        condition: service_healthy
      mediamtx:
        condition: service_started
      minio:
        condition: service_healthy
      ml:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  # ──────────────────────────────────────
  # ML SERVICE — YOLO model registry + inference (Python / FastAPI)
  # Reads source frames from `stream` bucket (read-only) and writes annotated
  # results to the `ml` bucket on the shared MinIO instance.
  # ──────────────────────────────────────
  ml:
    build:
      context: ./services/ml
      dockerfile: Dockerfile
    image: ghcr.io/rezen351/enterprise-iot-modular-microservices/ml:latest
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_URL: "mysql+pymysql://${DB_USER}:${DB_PASSWORD}@mariadb-ml:3306/ml_db?charset=utf8mb4"
      JWT_SECRET: "${JWT_SECRET}"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ML_ACCESS_KEY}"
      MINIO_SECRET_KEY: "${MINIO_ML_SECRET_KEY}"
      MINIO_USE_SSL: "false"
      MINIO_ML_BUCKET: ml
      MINIO_STREAM_BUCKET: stream
      MINIO_PUBLIC_URL: http://localhost:8000/minio
      NATS_URL: "nats://nats:4222"
      NATS_SUBJECT_DETECTION: "detection.result"
    volumes:
      # Persisted, pre-seeded with best.pt (your trained YOLO weights).
      - ./volumes/ml-models:/app/models
    depends_on:
      mariadb-ml:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health').status==200 else 1)" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - iot-net

  # ──────────────────────────────────────
  # NOTIFICATION SERVICE — alert notifications via multiple channels
  # ──────────────────────────────────────
  notification:
    build:
      context: ./services/notification
      dockerfile: Dockerfile
    image: ghcr.io/rezen351/enterprise-iot-modular-microservices/notification:latest
    restart: unless-stopped
    environment:
      PORT: "8080"
      JWT_SECRET: "${JWT_SECRET}"
      DB_DSN: "${DB_USER}:${DB_PASSWORD}@tcp(mariadb-notification:3306)/notification_db?parseTime=true&charset=utf8mb4"
      REDIS_ADDR: "redis-shared:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_DB: "2"
      NATS_URL: "nats://nats:4222"
      PROMETHEUS_PORT: "9091"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASS: "${SMTP_PASS}"
      SMTP_FROM: "${SMTP_FROM}"
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
    depends_on:
      mariadb-notification:
        condition: service_healthy
      redis-shared:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

  # ──────────────────────────────────────
  # EXPORT SERVICE — telemetry/data export (CSV/Parquet) from TimescaleDB
  # ──────────────────────────────────────
  export-service:
    build:
      context: ./services/export
      dockerfile: Dockerfile
    image: ghcr.io/rezen351/enterprise-iot-modular-microservices/export:latest
    restart: unless-stopped
    environment:
      PORT: "8080"
      JWT_SECRET: "${JWT_SECRET}"
      TIMESCALEDB_MODULE_DSN: "postgres://${DB_USER}:${DB_PASSWORD}@timescaledb-module:5432/module_ts?sslmode=disable"
      REDIS_ADDR: "redis-shared:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_DB: "3"
      NATS_URL: "nats://nats:4222"
      PROMETHEUS_PORT: "9092"
    depends_on:
      timescaledb-module:
        condition: service_healthy
      redis-shared:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot-net

networks:
  iot-net:
    driver: bridge
