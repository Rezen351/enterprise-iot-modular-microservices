# =============================================================================
# Prometheus Configuration — IOT-Modular-Microservice
# Scrape interval: 15s (default)
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    project: "iot-modular-microservice"
    env: "development"

# ─── Alertmanager (optional, configure when needed) ──────────────────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# ─── Scrape configs ───────────────────────────────────────────────────────────
scrape_configs:

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Auth Service — scrape via internal Docker network (direct, no Kong)
  - job_name: "auth-service"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["auth:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "auth-service"

  # Module Service — onboarding (module/node) metrics
  - job_name: "module-service"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["module:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "module-service"

  # WS-Gateway — NATS → WebSocket bridge metrics
  - job_name: "wsgateway-service"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["wsgateway:8090"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "wsgateway-service"

  # Analytics Service — telemetry aggregation metrics
  - job_name: "analytics-service"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["analytics:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "analytics-service"

  # Control Service — device command dispatch metrics
  - job_name: "control-service"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["control:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "control-service"

  # Stream Service — CCTV stream metadata + MediaMTX registry metrics
  - job_name: "stream-service"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["stream:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "stream-service"

  # Audit Service — audit log ingestion + query metrics
  - job_name: "audit-service"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["audit:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "audit-service"

  # ALERT SERVICE — threshold evaluation + alert API metrics
  - job_name: "alert-service"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["alert:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "alert-service"

  # Notification Service — alert notifications via multiple channels
  - job_name: "ml-service"
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ["ml:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "ml-service"

  # Kong API Gateway — exposes metrics on port 8001 (admin API)
  - job_name: "kong"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["kong:8001"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "kong-gateway"

  # ─── Infra exporters ───────────────────────────────────────────────────

  # MariaDB Auth — via mysqld-exporter
  - job_name: "mariadb-auth"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["mysqld-exporter-auth:9104"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "mariadb-auth"

  # MariaDB Control — via mysqld-exporter
  - job_name: "mariadb-control"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["mysqld-exporter-control:9104"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "mariadb-control"

  # MariaDB Module — via mysqld-exporter
  - job_name: "mariadb-module"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["mysqld-exporter-module:9104"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "mariadb-module"

  # MariaDB Stream — via mysqld-exporter
  - job_name: "mariadb-stream"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["mysqld-exporter-stream:9104"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "mariadb-stream"

  # MariaDB Audit — via mysqld-exporter
  - job_name: "mariadb-audit"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["mysqld-exporter-audit:9104"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "mariadb-audit"

  # MariaDB Alert — via mysqld-exporter
  - job_name: "mariadb-alert"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["mysqld-exporter-alert:9104"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "mariadb-alert"

  # MariaDB Notification — via mysqld-exporter
  - job_name: "mariadb-ml"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["mysqld-exporter-ml:9104"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "mariadb-ml"

  # Redis (Module cache) — via redis-exporter
  - job_name: "redis-module"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["redis-exporter:9121"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "redis-module"

  # Redis (Alert cache) — via redis-exporter-alert
  - job_name: "redis-alert"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["redis-exporter-alert:9121"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "redis-alert"

  # Redis (Export cache) — via redis-exporter-export
  - job_name: "timescaledb-module"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["postgres-exporter-module:9187"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "timescaledb-module"

  # TimescaleDB Analytics — via postgres-exporter
  - job_name: "timescaledb-analytics"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["postgres-exporter-analytics:9187"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "timescaledb-analytics"

  # Mosquitto MQTT Broker — via mosquitto-exporter ($SYS/broker/#)
  - job_name: "mosquitto"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["mosquitto-exporter:9234"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "mosquitto-broker"

  # NATS JetStream — via prometheus-nats-exporter sidecar (:7777)
  - job_name: "nats"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["nats-exporter:7777"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "nats-server"

  # ─── Host / container resource metrics ─────────────────────────────
  # Node Exporter — host CPU, memory, disk, network.
  - job_name: "node-exporter"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["node-exporter:9100"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "host-node"

  # cAdvisor — per-container CPU/RAM/IO/network (find container bottlenecks).
  - job_name: "cadvisor"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["cadvisor:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "host-containers"

  # Monitor Service — docker-compose / container stats exporter
  - job_name: "monitor"
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ["monitor:9110"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "compose-services"
