server {
    listen 5173;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback - serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Kong (optional - browser can call Kong directly)
    location /auth/ {
        proxy_pass http://kong:8000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health/ {
        proxy_pass http://kong:8000/health/;
        proxy_set_header Host $host;
    }

    location /ws/ {
        proxy_pass http://kong:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /storage/ {
        proxy_pass http://kong:8000/storage/;
        proxy_set_header Host $host;
    }

    # Proxy MediaMTX HLS/WebRTC if needed directly (requires mediamtx container)
    # Uncomment if mediamtx is running
    # location /live/ {
    #     proxy_pass http://mediamtx:8888/;
    #     proxy_set_header Host $host;
    #     # MediaMTX v1.18+ HLS cookie redirect fix
    #     proxy_redirect / /live/;
    # }
}
